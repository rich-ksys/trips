<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Trip Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f5; --bg3: #ebebeb;
    --text: #1a1a1a; --text2: #666; --text3: #999;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
    --accent: #1a1a1a; --accent-text: #ffffff;
    --danger: #c0392b; --danger-bg: #fdf0ef;
    --radius: 12px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
      --text: #f2f2f7; --text2: #aeaeb2; --text3: #636366;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --accent: #f2f2f7; --accent-text: #1c1c1e;
      --danger: #ff453a; --danger-bg: #2d1412;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 2px; }
  .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat { background: var(--bg); border-radius: var(--radius); padding: 14px 16px; border: 0.5px solid var(--border); }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .stat-value { font-size: 26px; font-weight: 600; }
  .actions { display: flex; gap: 8px; margin-bottom: 8px; }
  .btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 14px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; flex: 1; -webkit-tap-highlight-color: transparent; transition: opacity 0.15s; }
  .btn:active { opacity: 0.6; }
  .btn.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
  .btn svg { width: 18px; height: 18px; flex-shrink: 0; }
  .btn.voice-on { border-color: var(--danger); color: var(--danger); animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .voice-hint { font-size: 12px; color: var(--text2); text-align: center; margin-bottom: 14px; min-height: 16px; }
  .voice-hint.listening { color: var(--danger); }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
  .trip-card { background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 14px 16px; margin-bottom: 10px; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-desc { font-size: 15px; font-weight: 500; flex: 1; line-height: 1.3; }
  .card-btns { display: flex; gap: 8px; flex-shrink: 0; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--text2); padding: 2px; -webkit-tap-highlight-color: transparent; }
  .icon-btn:active { opacity: 0.5; }
  .icon-btn.del { color: var(--danger); opacity: 0.7; }
  .icon-btn svg { width: 20px; height: 20px; }
  .card-meta { display: flex; gap: 16px; margin-top: 8px; font-size: 13px; color: var(--text2); }
  .meta { display: flex; align-items: center; gap: 4px; }
  .meta svg { width: 14px; height: 14px; }
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
  .empty svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.35; }

  /* Modal */
  .backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
  .backdrop.open { display: flex; }
  .sheet { background: var(--bg); border-radius: 20px 20px 0 0; padding: 20px 20px 40px; width: 100%; max-width: 480px; }
  .sheet h2 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 5px; }
  .field input, .field textarea {
    width: 100%; background: var(--bg2); border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm); padding: 10px 12px;
    font-size: 16px; color: var(--text); font-family: inherit;
    -webkit-appearance: none; appearance: none;
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .sheet-btns { display: flex; gap: 10px; margin-top: 16px; }
  .sheet-btns .btn { padding: 14px; font-size: 15px; }

  /* Confirm delete */
  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; align-items: center; justify-content: center; }
  .confirm-overlay.open { display: flex; }
  .confirm-box { background: var(--bg); border-radius: var(--radius); padding: 20px; width: 280px; text-align: center; }
  .confirm-box p { font-size: 14px; color: var(--text2); margin-bottom: 16px; }
  .confirm-box h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .confirm-btns { display: flex; gap: 8px; }
  .confirm-btns .btn { flex: 1; padding: 12px; }
  .confirm-btns .btn.danger { background: var(--danger); color: #fff; border-color: var(--danger); }
</style>
</head>
<body>
<div class="app">
  <h1>🚗 Trip Tracker</h1>
  <p class="subtitle">Business mileage log</p>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total trips</div>
      <div class="stat-value" id="stat-trips">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Total miles</div>
      <div class="stat-value" id="stat-miles">0.0</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn primary" onclick="openAdd()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add trip
    </button>
    <button class="btn" id="voice-btn" onclick="toggleVoice()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      Voice
    </button>
    <button class="btn" onclick="exportCSV()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
  </div>
  <p class="voice-hint" id="voice-hint"></p>

  <div class="section-label">Trips</div>
  <div id="trip-list"></div>
</div>

<!-- Add/Edit Sheet -->
<div class="backdrop" id="modal" onclick="backdropTap(event)">
  <div class="sheet">
    <h2 id="modal-title">Add trip</h2>
    <div class="field">
      <label>Description</label>
      <textarea id="f-desc" placeholder="e.g. Client visit – Acme Ltd" rows="2"></textarea>
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="f-date">
    </div>
    <div class="field">
      <label>Mileage</label>
      <input type="number" id="f-miles" placeholder="0" min="0" step="0.1" inputmode="decimal">
    </div>
    <div class="sheet-btns">
      <button class="btn primary" style="flex:2" onclick="saveTrip()">Save</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Confirm Delete -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3>Delete trip?</h3>
    <p id="confirm-desc">This cannot be undone.</p>
    <div class="confirm-btns">
      <button class="btn danger" onclick="confirmDelete()">Delete</button>
      <button class="btn" onclick="cancelDelete()">Cancel</button>
    </div>
  </div>
</div>

<script>
let trips = [];
let editId = null;
let deleteId = null;
let recognition = null;
let isListening = false;

const STORAGE_KEY = 'biz_trips_v1';

function saveLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(trips)); } catch(e) {}
}
function loadLocal() {
  try { const d = localStorage.getItem(STORAGE_KEY); if (d) trips = JSON.parse(d); } catch(e) {}
}

function today() { return new Date().toISOString().slice(0,10); }

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  document.getElementById('stat-trips').textContent = trips.length;
  const total = trips.reduce((s,t) => s + parseFloat(t.miles||0), 0);
  document.getElementById('stat-miles').textContent = total.toFixed(1);

  const list = document.getElementById('trip-list');
  if (!trips.length) {
    list.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12h18M3 6l9-3 9 3M3 18l9 3 9-3"/></svg>
      <div>No trips yet.<br>Tap Add trip or use Voice.</div>
    </div>`;
    return;
  }
  const sorted = [...trips].sort((a,b) => new Date(b.date)-new Date(a.date));
  list.innerHTML = sorted.map(t => `
    <div class="trip-card">
      <div class="card-top">
        <div class="card-desc">${esc(t.description)}</div>
        <div class="card-btns">
          <button class="icon-btn" onclick="openEdit('${t.id}')" aria-label="Edit trip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="icon-btn del" onclick="askDelete('${t.id}','${esc(t.description).slice(0,40)}')" aria-label="Delete trip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </div>
      <div class="card-meta">
        <span class="meta">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${fmtDate(t.date)}
        </span>
        <span class="meta">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
          ${parseFloat(t.miles).toFixed(1)} miles
        </span>
      </div>
    </div>
  `).join('');
}

function openAdd() {
  editId = null;
  document.getElementById('modal-title').textContent = 'Add trip';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-date').value = today();
  document.getElementById('f-miles').value = '';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('f-desc').focus(), 100);
}

function openEdit(id) {
  const t = trips.find(x => x.id === id);
  if (!t) return;
  editId = id;
  document.getElementById('modal-title').textContent = 'Edit trip';
  document.getElementById('f-desc').value = t.description;
  document.getElementById('f-date').value = t.date;
  document.getElementById('f-miles').value = t.miles;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
function backdropTap(e) { if (e.target === document.getElementById('modal')) closeModal(); }

function saveTrip() {
  const desc = document.getElementById('f-desc').value.trim();
  const date = document.getElementById('f-date').value;
  const miles = parseFloat(document.getElementById('f-miles').value);
  if (!desc || !date || isNaN(miles) || miles < 0) {
    alert('Please fill in all fields with valid values.');
    return;
  }
  if (editId) {
    const t = trips.find(x => x.id === editId);
    if (t) { t.description = desc; t.date = date; t.miles = miles; }
  } else {
    trips.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2,5), description: desc, date, miles });
  }
  saveLocal();
  render();
  closeModal();
}

function askDelete(id, descPreview) {
  deleteId = id;
  document.getElementById('confirm-desc').textContent = '"' + descPreview + '"';
  document.getElementById('confirm-overlay').classList.add('open');
}
function confirmDelete() {
  trips = trips.filter(x => x.id !== deleteId);
  deleteId = null;
  saveLocal();
  render();
  document.getElementById('confirm-overlay').classList.remove('open');
}
function cancelDelete() {
  deleteId = null;
  document.getElementById('confirm-overlay').classList.remove('open');
}

function exportCSV() {
  if (!trips.length) { alert('No trips to export yet.'); return; }
  const sorted = [...trips].sort((a,b) => new Date(a.date)-new Date(b.date));
  let csv = 'Date,Description,Miles\r\n';
  sorted.forEach(t => {
    csv += `${fmtDate(t.date)},"${t.description.replace(/"/g,'""')}",${parseFloat(t.miles).toFixed(1)}\r\n`;
  });
  const total = sorted.reduce((s,t) => s + parseFloat(t.miles), 0);
  csv += `\r\nTotal,,${total.toFixed(1)}\r\n`;
  try {
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'business_trips.csv';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  } catch(e) {
    // Fallback for iOS Safari restrictions
    const w = window.open('', '_blank');
    w.document.write('<pre>' + csv + '</pre>');
    w.document.title = 'business_trips.csv';
  }
}

// Voice
function setHint(msg, active) {
  const el = document.getElementById('voice-hint');
  el.textContent = msg;
  el.className = 'voice-hint' + (active ? ' listening' : '');
}

function toggleVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setHint('Voice recognition not available on this browser.', false);
    return;
  }
  if (isListening) { recognition && recognition.stop(); return; }

  recognition = new SR();
  recognition.lang = 'en-GB';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('voice-btn').classList.add('voice-on');
    setHint('Listening… say e.g. "Client visit Acme, 15th June, 45 miles"', true);
  };
  recognition.onend = () => {
    isListening = false;
    document.getElementById('voice-btn').classList.remove('voice-on');
    setHint('', false);
  };
  recognition.onerror = (e) => {
    isListening = false;
    document.getElementById('voice-btn').classList.remove('voice-on');
    setHint('Error: ' + e.error, false);
  };
  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    parseVoice(text);
  };
  recognition.start();
}

function parseVoice(text) {
  const t = text.toLowerCase();
  const milesMatch = t.match(/(\d+(?:\.\d+)?)\s*miles?/);
  const miles = milesMatch ? parseFloat(milesMatch[1]) : '';

  let date = today();
  const months = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const dm = t.match(/(\d{1,2})(?:st|nd|rd|th)?\s+(?:of\s+)?(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\s*(\d{4})?/);
  if (dm) {
    const mo = months[dm[2].slice(0,3)];
    const yr = dm[3] ? parseInt(dm[3]) : new Date().getFullYear();
    date = new Date(yr, mo, parseInt(dm[1])).toISOString().slice(0,10);
  } else if (/yesterday/.test(t)) {
    const d = new Date(); d.setDate(d.getDate()-1); date = d.toISOString().slice(0,10);
  }

  let desc = text
    .replace(/^(add|log|new|record)\s+(a\s+)?(business\s+)?trip[,:\s]*/i,'')
    .replace(/\b\d+(?:\.\d+)?\s*miles?\b/gi,'')
    .replace(/\b\d{1,2}(?:st|nd|rd|th)?\s+(?:of\s+)?(?:jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\s*(?:\d{4})?\b/gi,'')
    .replace(/\b(today|yesterday)\b/gi,'')
    .replace(/[,\s]+$/,'').replace(/^\s+/,'').replace(/\s{2,}/g,' ').trim();
  if (!desc) desc = 'Business trip';

  editId = null;
  document.getElementById('modal-title').textContent = 'Confirm voice entry';
  document.getElementById('f-desc').value = desc;
  document.getElementById('f-date').value = date;
  document.getElementById('f-miles').value = miles;
  document.getElementById('modal').classList.add('open');
}

loadLocal();
render();
</script>
</body>
</html>
